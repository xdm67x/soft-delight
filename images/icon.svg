<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F6"/>
      <stop offset="100%" style="stop-color:#E8E8E4"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#252541"/>
    </linearGradient>
  </defs>

  <!-- Light theme half -->
  <rect x="8" y="8" width="116" height="240" rx="16" fill="url(#bg)" stroke="#D0D0D0" stroke-width="2"/>

  <!-- Dark theme half -->
  <rect x="132" y="8" width="116" height="240" rx="16" fill="url(#darkBg)" stroke="#404070" stroke-width="2"/>

  <!-- Code lines on light side -->
  <rect x="28" y="60" width="60" height="8" rx="4" fill="#7C3AED"/>
  <rect x="28" y="80" width="40" height="8" rx="4" fill="#4338CA"/>
  <rect x="28" y="100" width="70" height="8" rx="4" fill="#0369A1"/>
  <rect x="28" y="120" width="50" height="8" rx="4" fill="#059669"/>
  <rect x="28" y="140" width="55" height="8" rx="4" fill="#D97706"/>

  <!-- Code lines on dark side -->
  <rect x="152" y="60" width="60" height="8" rx="4" fill="#A78BFA"/>
  <rect x="152" y="80" width="40" height="8" rx="4" fill="#818CF8"/>
  <rect x="152" y="100" width="70" height="8" rx="4" fill="#7DD3FC"/>
  <rect x="152" y="120" width="50" height="8" rx="4" fill="#6EE7B7"/>
  <rect x="152" y="140" width="55" height="8" rx="4" fill="#FBBF24"/>

  <!-- Center divider glow -->
  <rect x="124" y="8" width="8" height="240" fill="url(#bg)" opacity="0.1"/>
</svg>